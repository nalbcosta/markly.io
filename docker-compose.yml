services:
  app:
    build:
      context: ./markly-back
      dockerfile: Dockerfile
    image: markly-back-app
    container_name: markly-back-app
    env_file: ./markly-back/.env
    ports:
      - "8000:8000"
    volumes:
      - ./markly-back:/var/www/html
      - ./markly-back/storage:/var/www/html/storage
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["sh", "-c", "if [ ! -f .env ]; then cp .env.example .env; fi && composer install --prefer-dist --no-interaction --no-progress && php artisan key:generate --force && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"]

  db:
    image: mysql:8.0
    container_name: markly-back-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: markly_back
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: markly-back-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  dbdata:
